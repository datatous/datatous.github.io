<!-- Pretendard 웹폰트 -->
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

<!-- 읽기 진행 바 + 형광펜 -->
<style>
  #read-progress{position:fixed;top:0;left:0;height:3px;width:0;z-index:1000;
    background:linear-gradient(90deg,#2563eb,#60a5fa);transition:width .08s linear;}
  mark{background:linear-gradient(180deg,transparent 55%,#bfdbfe 55%);
    color:inherit;padding:0 .06em;border-radius:2px;}
</style>
<script>
  document.addEventListener('DOMContentLoaded',function(){
    var bar=document.createElement('div');bar.id='read-progress';document.body.appendChild(bar);
    function upd(){var h=document.documentElement;var max=h.scrollHeight-h.clientHeight;
      var p=max>0?(window.scrollY||h.scrollTop)/max*100:0;bar.style.width=p+'%';}
    window.addEventListener('scroll',upd,{passive:true});
    window.addEventListener('resize',upd);upd();
  });
</script>
