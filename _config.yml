# 나는 게을러서 자동화한다 — Henry Oh's Automation Chronicle

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

locale: "ko-KR"
title: "나는 게을러서 자동화한다"
title_separator: "-"
subtitle: "2주마다 하나씩, 자동화 연대기"
name: "Henry Oh (오현근)"
description: "AX 컨설턴트 Henry Oh가 직접 만들고 이해한 자동화 프로젝트를 2주마다 하나씩 기록합니다."
url: "https://datatous.github.io"
baseurl: ""
repository: "datatous/datatous.github.io"

words_per_minute: 200
search: true
search_full_content: true

author:
  name: "Henry Oh"
  avatar: ""
  bio: "게을러서 자동화하는<br>AX 컨설턴트"
  location: "Seoul, Korea"
  links:
    - label: "About"
      icon: "fas fa-fw fa-user"
      url: "/about/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/datatous"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/henryo.o/"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/datatous"
    - label: "Naver Blog"
      icon: "fas fa-fw fa-pen"
      url: "https://blog.naver.com/oh_seeing"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/henryo.o/"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

paginate: 8
paginate_path: /page:num/

markdown: kramdown
highlighter: rouge

permalink: /posts/:title/

include:
  - _pages

# Wiki — 세컨브레인 (llm_wiki 워커에서 자동 동기화)
collections:
  wiki:
    output: true
    permalink: /wiki/:name/

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: wiki
    values:
      layout: single
      author_profile: false
      read_time: false
      share: false
      toc: true
      toc_sticky: true
      sidebar:
        nav: "wiki"
