# 나는 게을러서 자동화한다 — Henry Oh's Automation Chronicle

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

locale: "ko-KR"
title: "나는 게을러서 자동화한다"
title_separator: "-"
subtitle: "2주마다 하나씩, 자동화 연대기"
name: "Henry Oh (오현근)"
description: "AX 컨설턴트 Henry Oh가 직접 만들고 이해한 자동화 프로젝트를 2주마다 하나씩 기록합니다."
url: "https://datatous.github.io"
baseurl: ""
repository: "datatous/datatous.github.io"

words_per_minute: 200

author:
  name: "Henry Oh (오현근)"
  bio: "AX 컨설턴트 @ 무니랩스 · 자동화 · 에이전틱 시스템 설계"
  location: "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/datatous"
    - label: "Portfolio"
      icon: "fas fa-fw fa-link"
      url: "https://ohseeing.oopy.io/"
    - label: "Naver Blog"
      icon: "fas fa-fw fa-pen"
      url: "https://blog.naver.com/oh_seeing"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/henryo.o/"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/datatous"
    - label: "Naver Blog"
      icon: "fas fa-fw fa-pen"
      url: "https://blog.naver.com/oh_seeing"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

paginate: 5
paginate_path: /page:num/

markdown: kramdown
highlighter: rouge

include:
  - _pages

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
